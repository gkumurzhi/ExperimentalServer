version: "3.9"

services:
  exphttp:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: exphttp:local
    container_name: exphttp
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data
    environment:
      EXPHTTP_ROOT: /data
    # Override the default CMD if you need TLS / auth:
    # command: ["--host", "0.0.0.0", "--port", "8080", "--tls", "--auth", "random"]
