repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies:
          - acme==5.5.0
          - cryptography==48.0.0
          - josepy==2.2.0
          - PyOpenSSL==26.2.0
        files: ^src/
        args: [--strict]

  - repo: local
    hooks:
      - id: static-ui-release-gates
        name: static UI release gates
        entry: python tools/check_static_ui_assets.py
        language: system
        pass_filenames: false
        files: ^(src/data/index\.html|src/data/static/.*|pyproject\.toml|tools/check_static_ui_assets\.py)$
      - id: browser-smoke-js-syntax
        name: browser smoke JS syntax
        entry: node --check tools/browser_smoke.playwright.js
        language: system
        pass_filenames: false
        files: ^tools/browser_smoke\.playwright\.js$
