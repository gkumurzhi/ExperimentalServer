name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

env:
  PIP_CONSTRAINT: constraints/ci.txt

jobs:
  pip-audit:
    name: pip-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install project + audit tool
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[crypto,dev,lint,test]"
          pip install pip-audit

      - name: Run pip-audit
        run: pip-audit --strict --disable-pip

  bandit:
    name: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run bandit
        run: bandit -r src -ll
