name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read

env:
  PIP_CONSTRAINT: constraints/ci.txt

jobs:
  pip-audit:
    name: pip-audit (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.14"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install package and audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pip-audit

      - name: Installed dependency completeness
        run: |
          set -euo pipefail
          python -m pip check
          python -m exphttp --help > /dev/null
          python -c "import acme, cryptography, josepy; from OpenSSL import SSL"
          python tools/check_dependency_constraints.py --constraints constraints/ci.txt

      - name: Run pinned constraints pip-audit
        run: python -m pip_audit --strict --no-deps -r constraints/ci.txt

  bandit:
    name: bandit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install bandit
        run: |
          python -m pip install --upgrade pip
          pip install bandit[toml]

      - name: Run bandit
        run: bandit -r src -ll
