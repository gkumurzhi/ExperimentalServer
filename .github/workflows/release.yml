name: Release Artifacts

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  PIP_CONSTRAINT: constraints/ci.txt

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and attest Python artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install release toolchain
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install build pip-audit

      - name: Check release tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          set -euo pipefail
          package_version="$(
            python - <<'PY'
          from src.config import __version__

          print(__version__)
          PY
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${package_version}" != "${tag_version}" ]; then
            echo "src.config.__version__ (${package_version}) does not match tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Build wheel and sdist
        run: |
          set -euo pipefail
          rm -rf build dist
          python -m build --sdist --wheel --outdir dist
          python - <<'PY'
          from pathlib import Path

          artifacts = sorted(Path("dist").glob("*"))
          if not any(path.suffix == ".whl" for path in artifacts):
              raise SystemExit("wheel artifact was not produced")
          if not any(path.name.endswith(".tar.gz") for path in artifacts):
              raise SystemExit("sdist artifact was not produced")
          for artifact in artifacts:
              print(f"{artifact} ({artifact.stat().st_size} bytes)")
          PY

      - name: Installed wheel smoke
        run: |
          set -euo pipefail
          smoke_venv="${RUNNER_TEMP}/exphttp-wheel-smoke"
          python -m venv "${smoke_venv}"
          "${smoke_venv}/bin/python" -m pip install --upgrade pip
          "${smoke_venv}/bin/pip" install dist/exphttp-*.whl
          cd "${RUNNER_TEMP}"
          "${smoke_venv}/bin/exphttp" --version
          "${smoke_venv}/bin/exphttp" --help > /dev/null
          "${smoke_venv}/bin/python" - <<'PY'
          import inspect
          import os
          from pathlib import Path

          import exphttp
          from exphttp import ExperimentalHTTPServer

          repo_root = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          module_paths = [
              Path(inspect.getfile(exphttp)).resolve(),
              Path(inspect.getfile(ExperimentalHTTPServer)).resolve(),
          ]
          for module_path in module_paths:
              if module_path == repo_root or module_path.is_relative_to(repo_root):
                  raise SystemExit(f"installed smoke imported from source tree: {module_path}")
              print(f"installed import: {module_path}")
          PY

      - name: Static UI wheel asset check
        run: python tools/check_static_ui_assets.py --wheel-only --wheel 'dist/exphttp-*.whl'

      - name: Install Chromium for browser smoke
        run: |
          npx --yes --package @playwright/cli@0.1.9 playwright-cli install-browser chromium --with-deps

      - name: Installed wheel browser smoke
        run: |
          set -euo pipefail
          cd "${RUNNER_TEMP}"
          "${RUNNER_TEMP}/exphttp-wheel-smoke/bin/python" \
            "${GITHUB_WORKSPACE}/tools/browser_smoke.py" \
            --installed-package

      - name: Scan pinned dependencies and generate SBOM
        run: |
          set -euo pipefail
          python -m pip_audit --strict --no-deps -r constraints/ci.txt
          python -m pip_audit \
            --strict \
            --no-deps \
            -r constraints/ci.txt \
            -f cyclonedx-json \
            -o dist/exphttp-dependency-sbom.cdx.json

      - name: Capture artifact paths
        id: artifacts
        run: |
          set -euo pipefail
          wheel="$(ls dist/exphttp-*.whl)"
          sdist="$(ls dist/exphttp-*.tar.gz)"
          sbom="$(ls dist/exphttp-dependency-sbom.cdx.json)"
          {
            echo "wheel=${wheel}"
            echo "sdist=${sdist}"
            echo "sbom=${sbom}"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate wheel provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifacts.outputs.wheel }}

      - name: Generate sdist provenance attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifacts.outputs.sdist }}

      - name: Generate wheel SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifacts.outputs.wheel }}
          sbom-path: ${{ steps.artifacts.outputs.sbom }}

      - name: Generate sdist SBOM attestation
        uses: actions/attest@v4
        with:
          subject-path: ${{ steps.artifacts.outputs.sdist }}
          sbom-path: ${{ steps.artifacts.outputs.sbom }}

      - name: Upload release artifacts of record
        uses: actions/upload-artifact@v7
        with:
          name: exphttp-release-${{ github.ref_name }}
          path: |
            dist/*.whl
            dist/*.tar.gz
            dist/*.cdx.json
          if-no-files-found: error
          retention-days: 90

      - name: Publish Python package to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1

  image:
    name: Build and publish GHCR image
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Check release tag matches package version
        run: |
          set -euo pipefail
          package_version="$(
            python - <<'PY'
          from src.config import __version__

          print(__version__)
          PY
          )"
          tag_version="${GITHUB_REF_NAME#v}"
          if [ "${package_version}" != "${tag_version}" ]; then
            echo "src.config.__version__ (${package_version}) does not match tag ${GITHUB_REF_NAME}" >&2
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/gkumurzhi/exphttp
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push GHCR image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true

      - name: Generate image provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/gkumurzhi/exphttp
          subject-digest: ${{ steps.build-image.outputs.digest }}
          push-to-registry: true
