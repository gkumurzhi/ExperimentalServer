name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PIP_CONSTRAINT: constraints/ci.txt

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[crypto,dev,lint,test]"

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Type check (mypy)
        run: mypy src

      - name: Test (pytest + coverage)
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=65

      - name: Upload coverage to artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,lint]"

      - name: Check generated docs mirrors
        run: |
          set -euo pipefail
          ruff check tools/sync_docs.py
          python tools/sync_docs.py --check

      - name: Build docs
        run: |
          set -euo pipefail
          mkdocs build --strict

  cross-platform:
    name: Cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[crypto,dev,test]"

      - name: CLI smoke
        run: |
          python -m src --version
          python -m src --help

      - name: Portable unit subset
        run: pytest -q tests/test_http tests/test_security/test_crypto.py tests/test_cli.py

  smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install smoke-check dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[crypto,dev,lint,test]"

      - name: Install Chromium for browser smoke
        run: |
          npx --yes playwright install --with-deps chromium

      - name: CLI, docs, and example sanity checks
        run: |
          set -euo pipefail
          python -m src --dir /tmp --version
          python -m src --help > /dev/null
          bash -n examples/basic_file_server.sh
          python examples/notepad_client.py --help > /dev/null
          if grep -R -n -E -- '--root|--max-upload|/notes/pubkey|X-Enc-Key|X-HMAC|--no-info' README.md API.md docs examples CLAUDE.md; then
            echo "Found stale documented contract references"
            exit 1
          fi

      - name: Browser smoke
        run: |
          set -euo pipefail
          python tools/browser_smoke.py

      - name: Docker smoke
        run: |
          set -euo pipefail
          docker build -t exphttp:ci .
          docker run --rm exphttp:ci --version
          cid="$(docker run -d -p 18082:8080 exphttp:ci)"
          trap 'docker rm -f "$cid" >/dev/null 2>&1 || true' EXIT
          sleep 2
          curl -fsS -X PING http://127.0.0.1:18082/ | tee /tmp/ping.json
          grep '"status": "pong"' /tmp/ping.json
