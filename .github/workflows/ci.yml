name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PIP_CONSTRAINT: constraints/ci.txt

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,lint,test]"

      - name: Dependency completeness smoke
        run: |
          set -euo pipefail
          python -m pip check
          python -m exphttp --help > /dev/null
          python -c "import acme, cryptography, josepy; from OpenSSL import SSL"

      - name: Pytest collection policy
        run: python tools/check_pytest_collection_policy.py

      - name: Lint (ruff)
        run: ruff check exphttp src tests

      - name: Format check (ruff)
        run: ruff format --check exphttp src tests

      - name: Type check (mypy)
        run: mypy exphttp src

      - name: Test (pytest + coverage)
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=65

      - name: Upload coverage to artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  python314-readiness:
    name: Python 3.14 package and security smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.14
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install readiness dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,lint,test]" build pip-audit

      - name: Runtime and security smoke
        run: |
          set -euo pipefail
          python -m pip check
          python -m exphttp --help > /dev/null
          python -c "import acme, cryptography, josepy; from OpenSSL import SSL"
          python tools/check_dependency_constraints.py --constraints constraints/ci.txt
          python -m pip_audit --strict --no-deps -r constraints/ci.txt

      - name: Build package artifacts
        run: |
          set -euo pipefail
          rm -rf dist
          python -m build --sdist --wheel --outdir dist

      - name: Installed wheel smoke
        run: |
          set -euo pipefail
          smoke_venv="${RUNNER_TEMP}/exphttp-py314-wheel-smoke"
          python -m venv "${smoke_venv}"
          "${smoke_venv}/bin/python" -m pip install --upgrade pip
          "${smoke_venv}/bin/pip" install dist/exphttp-*.whl
          cd "${RUNNER_TEMP}"
          "${smoke_venv}/bin/exphttp" --version
          "${smoke_venv}/bin/exphttp" --help > /dev/null
          "${smoke_venv}/bin/python" - <<'PY'
          import inspect
          import os
          from pathlib import Path

          import exphttp
          from exphttp import ExperimentalHTTPServer

          repo_root = Path(os.environ["GITHUB_WORKSPACE"]).resolve()
          module_paths = [
              Path(inspect.getfile(exphttp)).resolve(),
              Path(inspect.getfile(ExperimentalHTTPServer)).resolve(),
          ]
          for module_path in module_paths:
              if module_path == repo_root or module_path.is_relative_to(repo_root):
                  raise SystemExit(f"installed smoke imported from source tree: {module_path}")
              print(f"installed import: {module_path}")
          PY

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,lint]"

      - name: Check generated docs and semantic guards
        run: |
          set -euo pipefail
          ruff check tools/sync_docs.py tools/check_stale_docs.py
          python tools/sync_docs.py --check
          python tools/check_stale_docs.py

      - name: Build docs
        run: |
          set -euo pipefail
          mkdocs build --strict

  risk-lanes:
    name: Risk lanes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Risk lane - parser and framing
        run: |
          python -m pytest -q \
            tests/test_property/test_request_parser.py \
            tests/test_property/test_ws_frame_parser.py \
            tests/test_http/test_content_length_smuggling.py \
            tests/test_security/test_websocket_frame_limit.py

      - name: Risk lane - auth
        run: python -m pytest -q tests/test_security/test_auth.py

      - name: Risk lane - CORS and profile policy
        run: |
          python -m pytest -q \
            tests/test_handler_registry.py \
            tests/test_request_pipeline.py \
            tests/test_server_methods.py \
            tests/test_security/test_websocket_upgrade.py

      - name: Risk lane - storage and quota
        run: |
          python -m pytest -q \
            tests/test_handlers/test_files.py \
            tests/test_handlers/test_notepad.py

      - name: Risk lane - WebSocket and Notepad
        run: |
          python -m pytest -q \
            tests/test_websocket.py \
            tests/test_websocket_handlers.py \
            tests/test_handlers/test_notepad.py \
            tests/test_security/test_websocket_upgrade.py

  cross-platform:
    name: Cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Dependency completeness smoke
        run: |
          python -m pip check
          python -m exphttp --help
          python -c "import acme, cryptography, josepy; from OpenSSL import SSL"

      - name: CLI smoke
        run: |
          python -m exphttp --version
          python -m exphttp --help

      - name: Portable unit subset
        run: pytest -q tests/test_http tests/test_security/test_crypto.py tests/test_cli.py

  smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install smoke-check dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,lint,test]"

      - name: Static UI release gates
        run: |
          set -euo pipefail
          wheel_dir="$(mktemp -d)"
          python -m pip wheel . --no-deps --wheel-dir "${wheel_dir}"
          python tools/check_static_ui_assets.py --wheel "${wheel_dir}"/exphttp-*.whl
          node --check tools/browser_smoke.playwright.js

      - name: Install Chromium for browser smoke
        run: |
          npx --yes --package @playwright/cli@0.1.9 playwright-cli install-browser chromium --with-deps

      - name: CLI, docs, and example sanity checks
        run: |
          set -euo pipefail
          python -m exphttp --dir /tmp --version
          python -m exphttp --help > /dev/null
          bash -n examples/basic_file_server.sh
          python examples/notepad_client.py --help > /dev/null
          python tools/check_stale_docs.py

      - name: Browser smoke
        run: |
          set -euo pipefail
          python tools/browser_smoke.py --profile lab --mode full
          python tools/browser_smoke.py --profile workspace --mode disabled-state
          python tools/browser_smoke.py --profile serve --mode disabled-state

      - name: Docker smoke
        run: |
          set -euo pipefail
          http_cid=""
          tls_cid=""
          auth_secret=""
          cleanup() {
            if [ -n "${http_cid}" ]; then
              docker rm -f "${http_cid}" >/dev/null 2>&1 || true
            fi
            if [ -n "${tls_cid}" ]; then
              docker rm -f "${tls_cid}" >/dev/null 2>&1 || true
            fi
            if [ -n "${auth_secret}" ]; then
              rm -f "${auth_secret}"
            fi
          }
          wait_health() {
            local cid="$1"
            local status=""
            for _ in {1..30}; do
              status="$(
                docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "${cid}"
              )"
              if [ "${status}" = "healthy" ]; then
                return 0
              fi
              if [ "${status}" = "unhealthy" ]; then
                docker inspect "${cid}"
                return 1
              fi
              sleep 1
            done
            echo "container ${cid} did not become healthy; last status=${status}" >&2
            docker inspect "${cid}"
            return 1
          }
          probe_ping() {
            local url="$1"
            local output="$2"
            local expected_profile="$3"
            shift 3
            for _ in {1..30}; do
              if curl --noproxy '*' "$@" -fsS -X PING "${url}" | tee "${output}"; then
                python -c 'import json, sys; data=json.load(open(sys.argv[1], encoding="utf-8")); status=data.get("status"); profile=data.get("profile"); assert status == "pong", f"unexpected PING status: {status!r}"; assert profile == sys.argv[2], f"unexpected PING profile: {profile!r}"' "${output}" "${expected_profile}" && return 0
              fi
              sleep 1
            done
            return 1
          }
          trap cleanup EXIT

          docker build -t exphttp:ci .
          docker run --rm --entrypoint python exphttp:ci \
            -c "import acme, cryptography, josepy; from OpenSSL import SSL"
          docker run --rm exphttp:ci --version
          http_cid="$(docker run -d -p 127.0.0.1::8080 exphttp:ci)"
          http_port="$(docker port "${http_cid}" 8080/tcp | awk -F: '{print $NF}')"
          wait_health "${http_cid}"
          if ! probe_ping "http://127.0.0.1:${http_port}/" /tmp/ping.json workspace; then
            docker logs "${http_cid}"
            exit 1
          fi

          auth_secret="$(mktemp)"
          printf 'ci:docker-smoke-password\n' > "${auth_secret}"
          chmod 644 "${auth_secret}"
          tls_cid="$(
            docker run -d --no-healthcheck \
              -p 127.0.0.1::8443 \
              -v "${auth_secret}:/run/secrets/exphttp_auth:ro" \
              exphttp:ci \
              --host 0.0.0.0 \
              --port 8443 \
              --dir /data \
              --profile workspace \
              --tls \
              --auth-file /run/secrets/exphttp_auth
          )"
          if [ "$(docker inspect --format '{{if .Config.Healthcheck}}{{json .Config.Healthcheck.Test}}{{else}}null{{end}}' "${tls_cid}")" != '["NONE"]' ]; then
            docker inspect "${tls_cid}"
            exit 1
          fi
          tls_port="$(docker port "${tls_cid}" 8443/tcp | awk -F: '{print $NF}')"
          if ! probe_ping "https://127.0.0.1:${tls_port}/" /tmp/tls-ping.json workspace -k -u ci:docker-smoke-password; then
            docker logs "${tls_cid}"
            exit 1
          fi
