name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PIP_CONSTRAINT: constraints/ci.txt

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,lint,test]"

      - name: Dependency completeness smoke
        run: |
          set -euo pipefail
          python -m pip check
          python -m src --help > /dev/null
          python -c "import acme, cryptography, josepy; from OpenSSL import SSL"

      - name: Pytest collection policy
        run: python tools/check_pytest_collection_policy.py

      - name: Lint (ruff)
        run: ruff check src tests

      - name: Format check (ruff)
        run: ruff format --check src tests

      - name: Type check (mypy)
        run: mypy src

      - name: Test (pytest + coverage)
        run: pytest --cov=src --cov-report=term-missing --cov-report=xml --cov-fail-under=65

      - name: Upload coverage to artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  docs:
    name: Docs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install docs toolchain
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs,lint]"

      - name: Check generated docs and semantic guards
        run: |
          set -euo pipefail
          ruff check tools/sync_docs.py tools/check_stale_docs.py
          python tools/sync_docs.py --check
          python tools/check_stale_docs.py

      - name: Build docs
        run: |
          set -euo pipefail
          mkdocs build --strict

  cross-platform:
    name: Cross-platform smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,test]"

      - name: Dependency completeness smoke
        run: |
          python -m pip check
          python -m src --help
          python -c "import acme, cryptography, josepy; from OpenSSL import SSL"

      - name: CLI smoke
        run: |
          python -m src --version
          python -m src --help

      - name: Portable unit subset
        run: pytest -q tests/test_http tests/test_security/test_crypto.py tests/test_cli.py

  smoke:
    name: Release smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            constraints/ci.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install smoke-check dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,lint,test]"

      - name: Static UI release gates
        run: |
          set -euo pipefail
          wheel_dir="$(mktemp -d)"
          python -m pip wheel . --no-deps --wheel-dir "${wheel_dir}"
          python tools/check_static_ui_assets.py --wheel "${wheel_dir}"/exphttp-*.whl
          node --check tools/browser_smoke.playwright.js

      - name: Install Chromium for browser smoke
        run: |
          npx --yes --package @playwright/cli@0.1.9 playwright-cli install-browser chromium --with-deps

      - name: CLI, docs, and example sanity checks
        run: |
          set -euo pipefail
          python -m src --dir /tmp --version
          python -m src --help > /dev/null
          bash -n examples/basic_file_server.sh
          python examples/notepad_client.py --help > /dev/null
          python tools/check_stale_docs.py

      - name: Browser smoke
        run: |
          set -euo pipefail
          python tools/browser_smoke.py

      - name: Docker smoke
        run: |
          set -euo pipefail
          http_cid=""
          tls_cid=""
          auth_secret=""
          cleanup() {
            if [ -n "${http_cid}" ]; then
              docker rm -f "${http_cid}" >/dev/null 2>&1 || true
            fi
            if [ -n "${tls_cid}" ]; then
              docker rm -f "${tls_cid}" >/dev/null 2>&1 || true
            fi
            if [ -n "${auth_secret}" ]; then
              rm -f "${auth_secret}"
            fi
          }
          wait_health() {
            local cid="$1"
            local status=""
            for _ in {1..30}; do
              status="$(
                docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing{{end}}' "${cid}"
              )"
              if [ "${status}" = "healthy" ]; then
                return 0
              fi
              if [ "${status}" = "unhealthy" ]; then
                docker inspect "${cid}"
                return 1
              fi
              sleep 1
            done
            echo "container ${cid} did not become healthy; last status=${status}" >&2
            docker inspect "${cid}"
            return 1
          }
          probe_ping() {
            local url="$1"
            local output="$2"
            shift 2
            for _ in {1..30}; do
              if curl --noproxy '*' "$@" -fsS -X PING "${url}" | tee "${output}" \
                && grep '"status": "pong"' "${output}"; then
                return 0
              fi
              sleep 1
            done
            return 1
          }
          trap cleanup EXIT

          docker build -t exphttp:ci .
          docker run --rm --entrypoint python exphttp:ci \
            -c "import acme, cryptography, josepy; from OpenSSL import SSL"
          docker run --rm exphttp:ci --version
          http_cid="$(docker run -d -p 127.0.0.1::8080 exphttp:ci)"
          http_port="$(docker port "${http_cid}" 8080/tcp | awk -F: '{print $NF}')"
          wait_health "${http_cid}"
          if ! probe_ping "http://127.0.0.1:${http_port}/" /tmp/ping.json; then
            docker logs "${http_cid}"
            exit 1
          fi

          auth_secret="$(mktemp)"
          printf 'ci:docker-smoke-password\n' > "${auth_secret}"
          chmod 644 "${auth_secret}"
          tls_cid="$(
            docker run -d --no-healthcheck \
              -p 127.0.0.1::8443 \
              -v "${auth_secret}:/run/secrets/exphttp_auth:ro" \
              exphttp:ci \
              --host 0.0.0.0 \
              --port 8443 \
              --dir /data \
              --tls \
              --auth-file /run/secrets/exphttp_auth
          )"
          if [ "$(docker inspect --format '{{if .Config.Healthcheck}}{{json .Config.Healthcheck.Test}}{{else}}null{{end}}' "${tls_cid}")" != '["NONE"]' ]; then
            docker inspect "${tls_cid}"
            exit 1
          fi
          tls_port="$(docker port "${tls_cid}" 8443/tcp | awk -F: '{print $NF}')"
          if ! probe_ping "https://127.0.0.1:${tls_port}/" /tmp/tls-ping.json -k -u ci:docker-smoke-password; then
            docker logs "${tls_cid}"
            exit 1
          fi
